#spinnerContainer {

  left:50%;

  text-align:center;
}

#spinnerContainer h2 {

  text-align:center;

  font-size:22px;

#spinner {
  width:100%;
  height:100%;
  position:absolute;
  transform:rotate(0deg);
  transition: transform 4s cubic-bezier(0.25,1,0.5,1);
}
.item {
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  transform-origin: 50% 50%;
  clip-path: polygon(50% 50%, 100% 0%, 100% 100%);
}

.item .text {
  position: absolute;         /* penting biar bisa dikontrol */
  top: 50%;                   /* titik tengah slice vertikal */
  left: 85%;                  /* kira-kira titik tengah “panjang” slice */

  color: white;
  font-size: 12px;
  width: 80px;
}

#pointer {

function startSpinner(){
  const spinner = document.getElementById('spinner');
  const spinBtn = document.getElementById('spinBtn');
  const spinnerResult = document.getElementById('spinnerResult');

  spinBtn.disabled = false;
  spinnerResult.textContent = "";

  spinBtn.onclick = ()=>{
    spinBtn.disabled = true;
    spinnerResult.textContent = "";

    const hadiahTarget = "Kirim pap & dapet uang jajan dari abang";

    const slices = [
      {text:"Kirim pap & dapet uang jajan dari abang", start:0, end:72},
      {text:"Sebulan ga dapet jajan 😅", start:72, end:144},
      {text:"Dapat snack favorit 🍫", start:144, end:216},
      {text:"Harus nyanyi 1 lagu 🎤", start:216, end:288},
      {text:"Kirim foto lucu ke abang 😎", start:288, end:360},
    ];

    const targetSlice = slices.find(s=>s.text===hadiahTarget);
    const targetDeg = targetSlice.start + (targetSlice.end-targetSlice.start)/2;
    const totalRotate = 360*5 + (360 - targetDeg);

    spinner.style.transition = "transform 4s cubic-bezier(0.25,1,0.5,1)";
    spinner.style.transform = `rotate(${totalRotate}deg)`;

    setTimeout(()=>{
      spinnerResult.textContent = "🎉 " + hadiahTarget;
      spinBtn.disabled = false;
           countdownBtn.style.display = "block";
     spinner.style.transition = "none";       // reset transition
    spinner.style.transform = `rotate(${360 - targetDeg}deg)`; // reset posisi untuk putaran berikutnya
    },4000);
  };
}

    document.getElementById("minutes").textContent = minutes.toString().padStart(2,'0');
    document.getElementById("seconds").textContent = seconds.toString().padStart(2,'0');
  }, 1000);
});

</script>
